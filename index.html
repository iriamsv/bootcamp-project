<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>TaskFlow</title>

  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<header>
  <h1>Tareas</h1>
</header>


<main>

  <!-- =========================
       LISTA DE TAREAS
  ========================= -->

  <section class="task-list">

    <div class="top-controls">

      <button type="button" id="openModal" class="add-btn">
        + Añadir tarea
      </button>

      <div class="filters">

        <button data-filter="all">Todas</button>
        <button data-filter="pending">Pendientes</button>
        <button data-filter="completed">Completadas</button>

        <div class="category-filter">

          <button id="categoryButton">Categorías</button>

          <select id="categorySelect" class="hidden">
            <option value="all">Todas</option>
            <option value="personal">Personal</option>
            <option value="trabajo">Trabajo</option>
            <option value="estudio">Estudio</option>
            <option value="compras">Compras</option>
            <option value="otros">Otros</option>
          </select>

        </div>

      </div>

    </div>

    <!-- Lista de tareas -->
    <ul id="tasks"></ul>

  </section>



  <!-- =========================
       PANEL DERECHO
  ========================= -->

  <aside class="stats">

    <!-- Calendario -->

    <div class="calendar-box">

      <h2>Calendario</h2>

      <div id="calendar"></div>

    </div>


    <!-- Estadísticas -->

    <div class="statistics">

      <h2>Estadísticas</h2>

      <p>Total: <span id="total-tasks">0</span></p>
      <p>Completadas: <span id="completed-tasks">0</span></p>
      <p>Pendientes: <span id="pending-tasks">0</span></p>

    </div>

  </aside>

</main>



<!-- =========================
     MODAL NUEVA TAREA
========================= -->

<div id="taskModal" class="modal hidden">

  <div class="modal-content">

    <h2>Nueva tarea</h2>

    <input id="modalTaskTitle" type="text" placeholder="Título de la tarea">

    <label>Categoría</label>
    <select id="modalTaskCategory">
      <option value="personal">Personal</option>
      <option value="trabajo">Trabajo</option>
      <option value="estudio">Estudio</option>
      <option value="compras">Compras</option>
      <option value="otros">Otros</option>
    </select>

    <label>Fecha objetivo</label>
    <input id="modalTaskDate" type="date">

    <div class="modal-buttons">
      <button id="saveTask">Guardar</button>
      <button id="closeModal">Cancelar</button>
    </div>

  </div>

</div>



<script src="app.js"></script>

</body>
</html>
